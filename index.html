<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <h1>Tic Tac Toe</h1>
  <div class="subtitle">First to three in a row wins</div>

  <div class="mode-select">
    <button class="mode-btn active" data-mode="pvp">Player vs Player</button>
    <button class="mode-btn" data-mode="cpu">Player vs Computer</button>
  </div>

  <div class="status" id="status">X's turn</div>

  <div class="board" id="board"></div>

  <div class="scoreboard">
    <div>X wins: <span id="scoreX">0</span></div>
    <div>Draws: <span id="scoreD">0</span></div>
    <div>O wins: <span id="scoreO">0</span></div>
  </div>

  <div class="controls">
    <button class="btn" id="resetBtn">New Round</button>
    <button class="btn secondary" id="resetScoreBtn">Reset Scores</button>
  </div>
</div>

<script src="js/constants.js"></script>
<script src="js/gameLogic.js"></script>
<script src="js/ai.js"></script>
<script src="js/board.js"></script>
<script src="js/scoreboard.js"></script>
<script src="js/app.js"></script>
</body>
</html>
