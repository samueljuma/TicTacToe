<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  :root {
    --bg: #1a1c2c;
    --panel: #24263a;
    --accent: #6c5ce7;
    --x-color: #ff6b6b;
    --o-color: #4ecdc4;
    --text: #f0f0f5;
    --muted: #8a8da8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #2b2e4a, var(--bg));
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
  }
  .app {
    background: var(--panel);
    border-radius: 20px;
    padding: 28px 32px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    width: min(92vw, 420px);
    text-align: center;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 1.8rem;
    letter-spacing: 1px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 18px;
  }
  .mode-select {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .mode-btn {
    flex: 1;
    padding: 9px 6px;
    border-radius: 10px;
    border: 1px solid transparent;
    background: #32354f;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    transition: background 0.15s, border-color 0.15s;
  }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
  }
  .status {
    font-size: 1.05rem;
    min-height: 28px;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 0 auto 18px;
    width: 100%;
    max-width: 320px;
  }
  .cell {
    aspect-ratio: 1 / 1;
    background: #2f3250;
    border: none;
    border-radius: 12px;
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .cell:hover:not(:disabled) {
    background: #393c5c;
  }
  .cell:disabled {
    cursor: default;
  }
  .cell.x { color: var(--x-color); }
  .cell.o { color: var(--o-color); }
  .cell.win {
    background: var(--accent);
    color: white;
  }
  .cell.pop {
    animation: pop 0.18s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.6); }
    100% { transform: scale(1); }
  }
  .controls {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn.secondary {
    background: #32354f;
  }
  .scoreboard {
    display: flex;
    justify-content: space-between;
    margin: 14px 0 18px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .scoreboard span { color: var(--text); font-weight: 700; }
</style>
</head>
<body>
<div class="app">
  <h1>Tic Tac Toe</h1>
  <div class="subtitle">First to three in a row wins</div>

  <div class="mode-select">
    <button class="mode-btn active" data-mode="pvp">Player vs Player</button>
    <button class="mode-btn" data-mode="cpu">Player vs Computer</button>
  </div>

  <div class="status" id="status">X's turn</div>

  <div class="board" id="board"></div>

  <div class="scoreboard">
    <div>X wins: <span id="scoreX">0</span></div>
    <div>Draws: <span id="scoreD">0</span></div>
    <div>O wins: <span id="scoreO">0</span></div>
  </div>

  <div class="controls">
    <button class="btn" id="resetBtn">New Round</button>
    <button class="btn secondary" id="resetScoreBtn">Reset Scores</button>
  </div>
</div>

<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const resetBtn = document.getElementById('resetBtn');
const resetScoreBtn = document.getElementById('resetScoreBtn');
const modeBtns = document.querySelectorAll('.mode-btn');
const scoreXEl = document.getElementById('scoreX');
const scoreOEl = document.getElementById('scoreO');
const scoreDEl = document.getElementById('scoreD');

const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let board, current, gameOver, mode = 'pvp';
let scores = { X: 0, O: 0, D: 0 };

function init() {
  board = Array(9).fill(null);
  current = 'X';
  gameOver = false;
  render();
  updateStatus();
}

function render() {
  boardEl.innerHTML = '';
  board.forEach((val, i) => {
    const cell = document.createElement('button');
    cell.className = 'cell' + (val ? ' ' + val.toLowerCase() : '');
    cell.textContent = val || '';
    cell.disabled = !!val || gameOver;
    cell.addEventListener('click', () => handleMove(i));
    boardEl.appendChild(cell);
  });
}

function updateStatus(message) {
  if (message) {
    statusEl.textContent = message;
  } else {
    statusEl.textContent = `${current}'s turn`;
  }
}

function checkWinner(b) {
  for (const line of WIN_LINES) {
    const [a, c, d] = line;
    if (b[a] && b[a] === b[c] && b[a] === b[d]) {
      return { winner: b[a], line };
    }
  }
  if (b.every(cell => cell)) return { winner: 'draw', line: null };
  return null;
}

function handleMove(i) {
  if (gameOver || board[i]) return;
  makeMove(i);
  if (!gameOver && mode === 'cpu' && current === 'O') {
    setTimeout(cpuMove, 350);
  }
}

function makeMove(i) {
  board[i] = current;
  const result = checkWinner(board);
  render();
  highlightLastMove(i);

  if (result) {
    gameOver = true;
    if (result.winner === 'draw') {
      scores.D++;
      updateStatus("It's a draw!");
    } else {
      scores[result.winner]++;
      highlightWin(result.line);
      updateStatus(`${result.winner} wins!`);
    }
    updateScoreboard();
    disableAll();
    return;
  }

  current = current === 'X' ? 'O' : 'X';
  updateStatus();
}

function highlightLastMove(i) {
  const cell = boardEl.children[i];
  if (cell) cell.classList.add('pop');
}

function highlightWin(line) {
  line.forEach(i => boardEl.children[i].classList.add('win'));
}

function disableAll() {
  [...boardEl.children].forEach(c => c.disabled = true);
}

function updateScoreboard() {
  scoreXEl.textContent = scores.X;
  scoreOEl.textContent = scores.O;
  scoreDEl.textContent = scores.D;
}

// Minimax-based unbeatable CPU (plays as 'O')
function cpuMove() {
  if (gameOver) return;
  const best = minimax(board, 'O');
  makeMove(best.index);
}

function minimax(b, player) {
  const result = checkWinner(b);
  if (result) {
    if (result.winner === 'X') return { score: -10 };
    if (result.winner === 'O') return { score: 10 };
    return { score: 0 };
  }

  const moves = [];
  for (let i = 0; i < 9; i++) {
    if (!b[i]) {
      const newBoard = b.slice();
      newBoard[i] = player;
      const next = minimax(newBoard, player === 'O' ? 'X' : 'O');
      moves.push({ index: i, score: next.score });
    }
  }

  if (player === 'O') {
    return moves.reduce((best, m) => (m.score > best.score ? m : best));
  } else {
    return moves.reduce((best, m) => (m.score < best.score ? m : best));
  }
}

resetBtn.addEventListener('click', init);
resetScoreBtn.addEventListener('click', () => {
  scores = { X: 0, O: 0, D: 0 };
  updateScoreboard();
});

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    modeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    init();
  });
});

init();
</script>
</body>
</html>
